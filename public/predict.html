<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Dự đoán tăng huyết áp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font + Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Tailwind CDN (nếu bạn đang dùng) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="auth.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <!-- Menu -->
    <div id="menu-container"></div>
    <script>
        fetch("menu.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menu-container").innerHTML = html;
                const socket = io();
                socket.on('pill/data/status', (status) => {
                    const jsonStatus = JSON.parse(status);
                    const wifiIcon = document.getElementById('wifi-status');
                    if (!wifiIcon) console.log('wifiIcon not found');
                    console.log(jsonStatus.status);
                    if (jsonStatus.status === 'online') {
                        wifiIcon.innerHTML = '📶';
                        wifiIcon.className = 'text-green-500 text-xl md:text-2xl animate-pulse';
                        wifiIcon.title = 'Đã kết nối IoT';
                    } else {
                        wifiIcon.innerHTML = '📴';
                        wifiIcon.className = 'text-red-500 text-xl md:text-2xl';
                        wifiIcon.title = 'Mất kết nối IoT';
                    }
                });
            });
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) menu.classList.toggle('hidden');
        }
    </script>

    <main class="pt-32 pb-16 px-6 w-full max-w-5xl flex flex-col items-center">


        <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">
            <header class="text-center mb-12">
                <h2 class="text-2xl font-bold text-center mb-6 text-red-700">
                    🫀 Dự đoán nguy cơ tăng huyết áp
                </h2>
            </header>

            <form id="predictForm" class="space-y-4">

                <!-- Giới tính -->
                <div class="flex items-center">
                    <i class="fas fa-venus-mars text-blue-600 w-6"></i>
                    <label class="w-1/3 font-medium">Giới tính</label>
                    <select name="male" class="w-2/3 p-2 border rounded-lg" required>
                        <option value="1">Nam</option>
                        <option value="0">Nữ</option>
                    </select>
                </div>

                <!-- Tuổi -->
                <div class="flex items-center">
                    <i class="fas fa-user text-gray-600 w-6"></i>
                    <label class="w-1/3 font-medium">Tuổi</label>
                    <input type="number" name="age" min="1" required class="w-2/3 p-2 border rounded-lg">
                </div>

                <!-- Hút thuốc -->
                <div class="flex items-center">
                    <i class="fas fa-smoking text-gray-700 w-6"></i>
                    <label class="w-1/3 font-medium">Hút thuốc</label>
                    <select name="currentSmoker" class="w-2/3 p-2 border rounded-lg">
                        <option value="0">Không</option>
                        <option value="1">Có</option>
                    </select>
                </div>

                <!-- Số điếu/ngày -->
                <div class="flex items-center">
                    <i class="fas fa-fire text-orange-600 w-6"></i>
                    <label class="w-1/3 font-medium">Điếu/ngày</label>
                    <input type="number" name="cigsPerDay" min="0" class="w-2/3 p-2 border rounded-lg" value="0">
                </div>

                <!-- Thuốc huyết áp -->
                <div class="flex items-center">
                    <i class="fas fa-pills text-purple-600 w-6"></i>
                    <label class="w-1/3 font-medium">Dùng thuốc HA</label>
                    <select name="BPMeds" class="w-2/3 p-2 border rounded-lg">
                        <option value="0">Không</option>
                        <option value="1">Có</option>
                    </select>
                </div>

                <!-- Tiểu đường -->
                <div class="flex items-center">
                    <i class="fas fa-syringe text-red-500 w-6"></i>
                    <label class="w-1/3 font-medium">Tiểu đường</label>
                    <select name="diabetes" class="w-2/3 p-2 border rounded-lg">
                        <option value="0">Không</option>
                        <option value="1">Có</option>
                    </select>
                </div>

                <!-- Huyết áp tâm thu -->
                <div class="flex items-center">
                    <i class="fas fa-heartbeat text-red-700 w-6"></i>
                    <label class="w-1/3 font-medium">HA tâm thu</label>
                    <div class="w-2/3 flex gap-2">
                        <input type="number" name="sysBP" required readonly class="w-1/2 p-2 border rounded-lg bg-gray-100 cursor-not-allowed">
                        <select id="sysBpSelect" class="w-1/2 p-2 border rounded-lg">
                            <option value="">Chọn bản ghi...</option>
                        </select>
                    </div>
                </div>

                <!-- Huyết áp tâm trương -->
                <div class="flex items-center">
                    <i class="fas fa-heart text-pink-600 w-6"></i>
                    <label class="w-1/3 font-medium">HA tâm trương</label>
                    <div class="w-2/3 flex gap-2">
                        <input type="number" name="diaBP" required readonly class="w-1/2 p-2 border rounded-lg bg-gray-100 cursor-not-allowed">
                        <select id="diaBpSelect" class="w-1/2 p-2 border rounded-lg">
                            <option value="">Chọn bản ghi...</option>
                        </select>
                    </div>
                </div>

                <!-- BMI -->
                <div class="flex items-center">
                    <i class="fas fa-weight-scale text-green-600 w-6"></i>
                    <label class="w-1/3 font-medium">BMI</label>
                    <input type="number" step="0.1" name="BMI" required class="w-2/3 p-2 border rounded-lg">
                </div>

                <!-- Nhịp tim -->
                <div class="flex items-center">
                    <i class="fas fa-wave-square text-indigo-600 w-6"></i>
                    <label class="w-1/3 font-medium">Nhịp tim</label>
                    <div class="w-2/3 flex gap-2">
                        <input type="number" name="heartRate" required readonly class="w-1/2 p-2 border rounded-lg bg-gray-100 cursor-not-allowed">
                        <select id="heartRateSelect" class="w-1/2 p-2 border rounded-lg">
                            <option value="">Chọn bản ghi...</option>
                        </select>
                    </div>
                </div>

                <!-- Button -->
                <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition">
                    🔍 Dự đoán
                </button>
            </form>

            <!-- Result -->
            <div id="result" class="mt-6 text-center"></div>
        </div>
    </main>

    <script>
        // ====== Load dữ liệu huyết áp từ database cho 3 dropdown ======
        let allBpDataPredict = [];

        async function loadBpRecordsForPredict() {
            const userId = getCurrentUserId();
            if (!userId) {
                alert("Không lấy được thông tin người dùng. Vui lòng đăng nhập lại.");
                logout();
                return;
            }

            try {
                const res = await fetch(`/api/v1/measurement/bp/${userId}`);
                allBpDataPredict = await res.json();
                populateBpDropdownsPredict();
            } catch (err) {
                console.error("Lỗi khi tải dữ liệu huyết áp:", err);
            }
        }

        function populateSingleSelect(select, valueExtractor) {
            if (!select) return;

            select.innerHTML = '<option value="">Chọn bản ghi...</option>';

            if (!allBpDataPredict || allBpDataPredict.length === 0) {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "Không có dữ liệu";
                select.appendChild(opt);
                return;
            }

            const sorted = [...allBpDataPredict].sort((a, b) => {
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            sorted.forEach((record, index) => {
                if (!record.createdAt) return;


                const date = new Date(record.createdAt);
                const option = document.createElement("option");
                option.value = record._id || index;
                option.textContent = `(${date.toLocaleString("vi-VN", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                })})`;
                select.appendChild(option);
            });
        }

        function populateBpDropdownsPredict() {
            const sysSelect = document.getElementById("sysBpSelect");
            const diaSelect = document.getElementById("diaBpSelect");
            const heartSelect = document.getElementById("heartRateSelect");

            populateSingleSelect(sysSelect, (r) => r.systolic);
            populateSingleSelect(diaSelect, (r) => r.diastolic);
            populateSingleSelect(heartSelect, (r) => r.heart_beat);

            // Chọn mặc định bản ghi mới nhất (option đầu tiên sau placeholder)
            if (sysSelect && sysSelect.options.length > 1) {
                sysSelect.selectedIndex = 1;
                onBpRecordChangePredict("sys");
            }
            if (diaSelect && diaSelect.options.length > 1) {
                diaSelect.selectedIndex = 1;
                onBpRecordChangePredict("dia");
            }
            if (heartSelect && heartSelect.options.length > 1) {
                heartSelect.selectedIndex = 1;
                onBpRecordChangePredict("heart");
            }
        }

        function onBpRecordChangePredict(type) {
            let selectId, inputName, field;
            if (type === "sys") {
                selectId = "sysBpSelect";
                inputName = "sysBP";
                field = "systolic";
            } else if (type === "dia") {
                selectId = "diaBpSelect";
                inputName = "diaBP";
                field = "diastolic";
            } else if (type === "heart") {
                selectId = "heartRateSelect";
                inputName = "heartRate";
                field = "heart_beat";
            } else {
                return;
            }

            const select = document.getElementById(selectId);
            if (!select) return;

            const selectedId = select.value;
            if (!selectedId) return;

            const rec = allBpDataPredict.find(
                (r) => r._id === selectedId || (r._id && r._id.toString && r._id.toString() === selectedId)
            );
            if (!rec) return;

            const input = document.querySelector(`input[name="${inputName}"]`);
            if (input) {
                input.value = rec[field] ?? "";
            }
        }

        window.addEventListener("load", () => {
            loadBpRecordsForPredict();

            const sysSelect = document.getElementById("sysBpSelect");
            const diaSelect = document.getElementById("diaBpSelect");
            const heartSelect = document.getElementById("heartRateSelect");

            if (sysSelect) sysSelect.addEventListener("change", () => onBpRecordChangePredict("sys"));
            if (diaSelect) diaSelect.addEventListener("change", () => onBpRecordChangePredict("dia"));
            if (heartSelect) heartSelect.addEventListener("change", () => onBpRecordChangePredict("heart"));
        });

        // ====== Submit form dự đoán ======
        document.getElementById("predictForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            for (let k in data) {
                data[k] = data[k] === "" ? null : Number(data[k]);
            }

            try {
                const res = await fetch("/api/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                document.getElementById("result").innerHTML = `
                    <h4 class="text-xl font-semibold mb-2 text-green-600">Kết quả:</h4>
                    <p><b>Mức huyết áp:</b> ${result.BP_Level}</p>
                    <p><b>Xác suất tăng huyết áp:</b> ${result.Hypertension_Risk}</p>
                `;
            } catch (err) {
                document.getElementById("result").innerHTML =
                    `<p class="text-red-500">Lỗi dự đoán</p>`;
            }
        });
    </script>


</body>

</html>
